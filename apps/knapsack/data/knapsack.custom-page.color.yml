description: >-
  Colors are a fundamental foundation of design at Teradata. Our color design system is built off Material Design. At
  their core, colors serve to evoke users’ emotions and provide visual hierarchy. Explore subjects such as color roles,
  creating palettes, and usage and details to ensure user interfaces represent how we use color consistently and
  effectively.
