description: >-
  Inclusive writing is about using clear and thoughtful language to create a welcoming experience for all users. Follow
  these guidelines to ensure that everyone interacting with the Teradata products feels welcome and included. The
  following guidelines focus on using inclusive language in all customer-facing content. In some cases, non-inclusive
  terms are a part of the programming language syntax or embedded in the code. In such cases, do not ignore those terms
  and use different terminology.
