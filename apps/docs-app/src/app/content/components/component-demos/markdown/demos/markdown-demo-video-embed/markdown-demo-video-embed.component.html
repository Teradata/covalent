<h2>Embed Videos in Markdown</h2>

<mat-card>
  <mat-card-header>
    <mat-card-title>Remote Videos (Public URLs)</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <td-markdown>{{ videoMarkdown }}</td-markdown>
  </mat-card-content>
</mat-card>

<br />

<mat-card>
  <mat-card-header>
    <mat-card-title>Local Videos</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <td-markdown>{{ localVideoMarkdown }}</td-markdown>
  </mat-card-content>
</mat-card>
